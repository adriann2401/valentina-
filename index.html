<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te amo mucho mi amor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="intro-screen">
        <div class="intro-glow"></div>
        <div class="intro-box">
            <div class="intro-icon">♡</div>
            <h1>¿Tú me amas?</h1>
            <p class="intro-subtitle">El universo está esperando tu respuesta...</p>
            <div class="btn-container">
                <button id="btn-si">Sí ❤️</button>
                <div class="btn-no-wrapper">
                    <button id="btn-no">No 💔</button>
                    <span id="sad-face" class="sad-face" aria-hidden="true">:</span>
                </div>
            </div>
        </div>
    </div>


    <div id="diario-contenedor" style="display: none;">
        <button id="diario-toggle" class="diario-toggle" type="button" aria-label="Cerrar razones">▼</button>
        <div class="diario-body">
            <div class="diario-header">
                <span>Mis Razones</span>
                <span id="diario-index">Razón 1/100</span>
            </div>
            <p id="diario-texto">Porque te amo xd</p>
            <div class="diario-controles">
                <button id="diario-prev">◀</button>
                <button id="diario-next">▶</button>
            </div>
        </div>
    </div>
        <audio id="bgMusic" loop>
            <source src="musica/fondo.mp3" type="audio/mpeg">
        </audio>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="script.js"></script>
</body>
        
</html>
